name: Build and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/dna-core/target
          key: cargo-${{ runner.os }}-${{ hashFiles('crates/dna-core/Cargo.toml') }}
      - name: Run Rust tests
        run: cargo test --manifest-path crates/dna-core/Cargo.toml

  web-build:
    runs-on: ubuntu-latest
    needs: rust-tests
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Build WASM
        run: wasm-pack build --target web --release --out-dir pkg
        working-directory: crates/dna-core
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: web
      - name: Sync WASM
        run: cp ../crates/dna-core/pkg/dna_core_bg.wasm public/wasm/dna_core_bg.wasm
        working-directory: web
      - name: Typecheck
        run: npm run typecheck
        working-directory: web
      - name: Build
        run: npm run build
        working-directory: web
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: web/dist
