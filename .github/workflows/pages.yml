name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/dna-core/target
          key: cargo-${{ runner.os }}-${{ hashFiles('crates/dna-core/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Run Rust tests
        run: cargo test --manifest-path crates/dna-core/Cargo.toml

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM
        run: wasm-pack build --target web --release --out-dir pkg
        working-directory: crates/dna-core

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Sync WASM into public/
        run: cp ../crates/dna-core/pkg/dna_core_bg.wasm public/wasm/dna_core_bg.wasm
        working-directory: web

      - name: Typecheck
        run: npm run typecheck
        working-directory: web

      - name: Build for production (base = /dna-core/)
        run: npm run build
        working-directory: web

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
